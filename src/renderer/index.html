<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel-Agent</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <!-- 登录页面容器（默认显示） -->
    <div id="loginContainer"></div>

    <!-- 主页面容器（默认隐藏，登录成功后显示） -->
    <div id="mainContainer" style="display:none;">
    <!-- 全局顶栏 -->
    <div class="top-bar">
      <!-- 第一行：标签栏 -->
      <div class="tab-row">
        <div class="tab-bar" id="tabBar">
          <div class="tab-list" id="tabList"></div>
          <button class="tab-new-btn" id="newTabBtn" data-i18n-title="nav.newTab" title="新建标签页">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- 第二行：导航 + URL + 控制后台 -->
      <div class="nav-row">
        <div class="nav-controls" id="navControls">
          <button class="nav-btn" id="backBtn" data-i18n-title="nav.back" title="后退" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <button class="nav-btn" id="forwardBtn" data-i18n-title="nav.forward" title="前进" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
          <button class="nav-btn" id="reloadBtn" data-i18n-title="nav.reload" title="刷新">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
          </button>
          <div class="url-bar">
            <input
              type="text"
              id="urlInput"
              data-i18n-placeholder="url.placeholder"
              placeholder="输入网址或搜索..."
              autocomplete="off"
            />
            <button class="go-btn" id="goBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
            <button class="bookmark-star-btn" id="bookmarkStarBtn" title="收藏此页面">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
          </div>
          <div class="loading-indicator" id="loadingIndicator">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <button class="lang-toggle-btn" id="langToggleBtn" title="切换语言 / Switch Language">
          <span id="langZh" class="lang-option active">中</span>
          <span class="lang-divider">/</span>
          <span id="langEn" class="lang-option">EN</span>
        </button>
        <select class="tz-select" id="tzSelect" title="时区 / Timezone">
          <option value="Asia/Shanghai">🕐 北京</option>
          <option value="America/New_York">🕐 New York</option>
          <option value="America/Los_Angeles">🕐 Los Angeles</option>
          <option value="Europe/London">🕐 London</option>
          <option value="Asia/Tokyo">🕐 Tokyo</option>
        </select>
        <button class="theme-toggle-btn" id="themeToggleBtn" data-i18n-title="nav.themeToggle" title="切换主题">
          <!-- 亮色图标：太阳 -->
          <svg class="icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- 暗色图标：月亮 -->
          <svg class="icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="control-panel-btn" id="controlPanelBtn" data-i18n-title="nav.controlPanel" title="控制后台">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span data-i18n="nav.controlPanel">控制后台</span>
        </button>
        <div class="user-info" id="userInfo" style="display:none;">
          <span class="user-display-name" id="userDisplayName"></span>
          <button class="nav-btn chat-history-btn" id="chatHistoryBtn" type="button" data-i18n-title="chat.history.title" title="历史记录">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <path d="M3 3v6h6"/>
              <path d="M12 7v5l3 2"/>
            </svg>
          </button>
          <button class="nav-btn logout-btn" id="logoutBtn" title="退出登录">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="chat-history-popover" id="chatHistoryPopover" aria-hidden="true">
          <div class="chat-history-header">
            <h3 data-i18n="chat.history.title">历史记录</h3>
            <button class="chat-history-close" id="chatHistoryClose" type="button" data-i18n-title="chat.history.close" title="关闭">&times;</button>
          </div>
          <div class="chat-history-list" id="chatHistoryList"></div>
        </div>
      </div>
    </div>

    <!-- 分屏布局容器 -->
    <div class="split-container">
      <!-- 左侧面板：网页浏览区域 -->
      <div class="panel left-panel" id="leftPanel">
        <!-- 书签栏（仅左侧浏览器区域） -->
        <div class="bookmark-bar" id="bookmarkBar">
          <div class="bookmark-items" id="bookmarkItems"></div>
        </div>
        <!-- WebView占位区域 -->
        <div class="webview-container" id="webviewContainer">
          <div class="webview-placeholder">
            <div class="placeholder-content">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
              <h2 data-i18n="placeholder.title">欢迎使用 Hotel-Agent</h2>
              <p data-i18n="placeholder.subtitle">在上方输入网址开始浏览</p>
            </div>
          </div>
        </div>
        
        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage" style="display: none;">
          <div class="error-content">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText"></span>
          </div>
        </div>
      </div>
      
      <!-- 分隔条 -->
      <div class="resizer" id="resizer">
        <div class="resizer-handle"></div>
      </div>
      
      <!-- 右侧面板：AI对话区域 -->
      <div class="panel right-panel" id="rightPanel">
        <!-- 登录通知横幅容器 -->
        <div id="loginBannerContainer"></div>

        <!-- 消息列表 -->
        <div class="chat-messages" id="chatMessages">
          <div class="welcome-message">
            <h3 data-i18n="chat.welcome.title">你好！我是你的AI助手</h3>
            <p data-i18n="chat.welcome.desc">我可以帮助你浏览网页、回答问题、提供建议。</p>
            <p class="welcome-hint" data-i18n="chat.welcome.hint">在下方输入框中输入消息开始对话</p>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-container">
          <div class="chat-input-wrapper">
            <textarea
              id="chatInput"
              class="chat-input"
              data-i18n-placeholder="chat.input.placeholder"
              placeholder="输入消息..."
              rows="1"
            ></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
            <button class="clear-chat-btn" id="clearChatBtn" title="新建对话">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                <line x1="12" y1="8" x2="12" y2="14"/>
                <line x1="9" y1="11" x2="15" y2="11"/>
              </svg>
            </button>
          </div>
          <div class="input-hint" data-i18n="chat.input.hint">
            按 Enter 发送，Shift + Enter 换行
          </div>
        </div>
      </div>
    </div>
    </div><!-- /mainContainer -->
  </div>
</body>
</html>
