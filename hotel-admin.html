<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">酒店管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      color: #333;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
    }
    .admin-layout { display: flex; height: 100vh; }

    /* 侧边栏 */
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #001529 0%, #002140 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-logo {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo svg { width: 28px; height: 28px; margin-right: 10px; color: #1890ff; }
    .sidebar-logo span { font-size: 16px; font-weight: 600; color: #fff; white-space: nowrap; }
    .sidebar-menu { flex: 1; padding: 8px 0; overflow-y: auto; }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px; cursor: pointer;
      color: rgba(255,255,255,0.65); transition: all 0.2s;
      font-size: 14px; text-decoration: none; border: none; background: none; width: 100%;
    }
    .menu-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .menu-item.active {
      color: #fff; background: #1890ff;
      border-right: 3px solid #69c0ff;
    }
    .menu-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* 主内容区 */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-header {
      height: 56px; background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center;
      padding: 0 24px; font-size: 18px; font-weight: 600; color: #1a1a2e;
      flex-shrink: 0;
    }
    .main-content { flex: 1; padding: 24px; overflow-y: auto; }
    /* 内容卡片 */
    .content-card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 24px; margin-bottom: 20px;
    }
    .content-card h3 {
      font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e;
      display: flex; align-items: center; gap: 8px;
    }
    .content-card h3 .badge {
      font-size: 12px; font-weight: 400; color: #fff; background: #52c41a;
      padding: 2px 8px; border-radius: 10px;
    }
    .content-card h3 .badge.empty { background: #faad14; }

    /* 表单 */
    .form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .form-label { width: 80px; text-align: right; color: #666; flex-shrink: 0; }
    .form-input {
      flex: 1; max-width: 360px; height: 36px; padding: 0 12px;
      border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
    .btn {
      height: 36px; padding: 0 16px; border: none; border-radius: 6px;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }
    .btn-danger { background: #fff; color: #ff4d4f; border: 1px solid #ff4d4f; }
    .btn-danger:hover { background: #fff1f0; }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }

    /* 竞品列表 */
    .competitor-list { margin-top: 12px; }
    .competitor-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border: 1px solid #f0f0f0; border-radius: 6px;
      margin-bottom: 8px; transition: background 0.2s;
    }
    .competitor-item:hover { background: #fafafa; }
    .competitor-item .name { font-weight: 500; }
    .competitor-item .meta { color: #999; font-size: 12px; }
    .competitor-item .actions { display: flex; gap: 8px; }
    .comp-dist { margin-left: 8px; font-size: 12px; color: #1890ff; background: #e6f7ff; padding: 1px 6px; border-radius: 3px; }
    .comp-address { font-size: 12px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 周边搜索 */
    .nearby-header { display: flex; align-items: center; justify-content: space-between; margin: 12px 0 8px; }
    .nearby-list { max-height: 400px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 6px; }
    .nearby-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.15s;
    }
    .nearby-item:last-child { border-bottom: none; }
    .nearby-item:hover { background: #f0f7ff; }
    .nearby-item.added { opacity: 0.55; cursor: default; }
    .nearby-item input[type="checkbox"] { flex-shrink: 0; width: 16px; height: 16px; accent-color: #1890ff; }
    .nearby-info { flex: 1; min-width: 0; }
    .nearby-name { font-weight: 500; font-size: 14px; display: block; }
    .nearby-meta { font-size: 12px; color: #999; display: block; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nearby-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
    .dist-tag { color: #1890ff; background: #e6f7ff; }
    .added-tag { color: #52c41a; background: #f6ffed; }
    .search-loading { text-align: center; padding: 24px; color: #999; font-size: 13px; }
    .spinner-small {
      display: inline-block; width: 14px; height: 14px; border: 2px solid #e0e0e0;
      border-top-color: #1890ff; border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 空状态 */
    .empty-state { text-align: center; padding: 32px 0; color: #999; }
    .empty-state .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 12px 20px;
      border-radius: 6px; color: #fff; font-size: 14px; z-index: 9999;
      opacity: 0; transform: translateY(-10px);
      transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #52c41a; }
    .toast.error { background: #ff4d4f; }
    .toast.info { background: #1890ff; }

    /* 加载状态 */
    .loading { text-align: center; padding: 40px; color: #999; }
    .loading::after {
      content: ''; display: inline-block; width: 20px; height: 20px;
      border: 2px solid #d9d9d9; border-top-color: #1890ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 开关组件 */
    .switch {
      position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 22px; transition: 0.3s;
    }
    .switch .slider::before {
      content: ''; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px;
      background: #fff; border-radius: 50%; transition: 0.3s;
    }
    .switch input:checked + .slider { background: #1890ff; }
    .switch input:checked + .slider::before { transform: translateX(22px); }
    .switch input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }

    /* 平台卡片 */
    .platform-card {
      border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .platform-card.disabled { opacity: 0.6; }
    .platform-card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .platform-card-header .platform-name { font-size: 15px; font-weight: 600; }
    .platform-card-header .platform-status {
      font-size: 12px; margin-left: 8px; padding: 2px 8px; border-radius: 10px;
    }
    .platform-card-header .platform-status.on { background: #e6f7ff; color: #1890ff; }
    .platform-card-header .platform-status.off { background: #fff1f0; color: #ff4d4f; }
    .skill-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: 6px; margin-bottom: 4px;
    }
    .skill-row:hover { background: #fafafa; }
    .skill-row .skill-label { color: #555; font-size: 13px; }
    .skill-row .skill-desc { color: #999; font-size: 12px; margin-left: 8px; }

    /* 数据面板 */
    .dashboard-tabs {
      display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0;
    }
    .dashboard-tab {
      padding: 10px 20px; cursor: pointer; font-size: 14px; color: #666;
      border: none; background: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .dashboard-tab:hover { color: #1890ff; }
    .dashboard-tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
    .time-range-bar {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .time-range-btn {
      padding: 6px 16px; border: 1px solid #d9d9d9; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s;
    }
    .time-range-btn:hover { border-color: #1890ff; color: #1890ff; }
    .time-range-btn.active { background: #1890ff; color: #fff; border-color: #1890ff; }
    .chart-container { position: relative; height: 320px; margin-bottom: 20px; }
    .chart-container canvas { width: 100% !important; }
    .no-data-hint { text-align: center; padding: 60px 0; color: #bbb; font-size: 15px; }
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: #fff; border-radius: 8px; padding: 16px; border: 1px solid #f0f0f0;
      text-align: center;
    }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #1890ff; }
    .stat-card .stat-label { font-size: 12px; color: #999; margin-top: 4px; }

    /* 日历表格 */
    .calendar-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .calendar-table th, .calendar-table td {
      padding: 6px 8px; text-align: center; border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    .calendar-table th {
      background: #fafafa; font-weight: 600; border-bottom: 2px solid #e8e8e8;
      position: sticky; top: 0; z-index: 1;
    }
    .calendar-table th:first-child, .calendar-table td:first-child {
      text-align: left; position: sticky; left: 0; background: #fff; z-index: 2;
    }
    .calendar-table th:first-child { z-index: 3; background: #fafafa; }
    .calendar-table .room-group-header {
      background: #f5f7fa; font-weight: 600; color: #333;
    }
    .calendar-table .sub-row td:first-child { padding-left: 24px; color: #888; font-size: 12px; }
    .calendar-table .price-cell { cursor: default; position: relative; }
    .calendar-table .price-cell .price-tooltip {
      display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px;
      white-space: nowrap; z-index: 10; pointer-events: none;
    }
    .calendar-table .price-cell:hover .price-tooltip { display: block; }
    .calendar-table .price-diff { background: #fff7e6; }
    .calendar-table .avail-green { background: #f6ffed; color: #389e0d; }
    .calendar-table .avail-yellow { background: #fffbe6; color: #d48806; }
    .calendar-table .avail-red { background: #fff1f0; color: #cf1322; }
    .calendar-table .avail-black { background: #f5f5f5; color: #999; font-weight: bold; }
    .calendar-table .metric-row td { font-size: 11px; color: #888; }
    .dashboard-panel { margin-bottom: 20px; }
    .dashboard-panel h4 {
      margin: 0 0 12px; font-size: 15px; font-weight: 600; color: #333;
      display: flex; align-items: center; gap: 8px;
    }
    .date-range-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .date-input {
      height: 32px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px;
      font-size: 13px; outline: none;
    }
    .date-input:focus { border-color: #1890ff; }

    /* ==================== 暗色主题 ==================== */
    [data-theme="dark"] body { color: #e0e0e0; background: #1e1e1e; }
    [data-theme="dark"] .sidebar { background: linear-gradient(180deg, #1a1a1a 0%, #252525 100%); }
    [data-theme="dark"] .sidebar-logo { border-bottom-color: rgba(255,255,255,0.06); }
    [data-theme="dark"] .main-header { background: #2d2d2d; border-bottom-color: #404040; color: #e0e0e0; }
    [data-theme="dark"] .main-content { background: #1e1e1e; }
    [data-theme="dark"] .content-card { background: #2d2d2d; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    [data-theme="dark"] .content-card h3 { color: #e0e0e0; }
    [data-theme="dark"] .form-input { background: #383838; border-color: #505050; color: #e0e0e0; }
    [data-theme="dark"] .form-input:focus { border-color: #5b8dd9; box-shadow: 0 0 0 2px rgba(91,141,217,0.2); }
    [data-theme="dark"] .form-label { color: #a0a0a0; }
    [data-theme="dark"] .competitor-item { border-color: #404040; }
    [data-theme="dark"] .competitor-item:hover { background: #383838; }
    [data-theme="dark"] .competitor-item .name { color: #e0e0e0; }
    [data-theme="dark"] .competitor-item .meta { color: #6b6b6b; }
    [data-theme="dark"] .comp-dist { background: #1a3a4d; color: #5bb8f5; }
    [data-theme="dark"] .comp-address { color: #6b6b6b; }
    [data-theme="dark"] .nearby-list { border-color: #404040; }
    [data-theme="dark"] .nearby-item { border-bottom-color: #353535; }
    [data-theme="dark"] .nearby-item:hover { background: #2a3a4a; }
    [data-theme="dark"] .nearby-name { color: #e0e0e0; }
    [data-theme="dark"] .nearby-meta { color: #6b6b6b; }
    [data-theme="dark"] .dist-tag { background: #1a3a4d; color: #5bb8f5; }
    [data-theme="dark"] .added-tag { background: #1a3d1a; color: #73d13d; }
    [data-theme="dark"] .platform-card { border-color: #404040; }
    [data-theme="dark"] .skill-row:hover { background: #383838; }
    [data-theme="dark"] .skill-row .skill-label { color: #c0c0c0; }
    [data-theme="dark"] .skill-row .skill-desc { color: #6b6b6b; }
    [data-theme="dark"] .dashboard-tabs { border-bottom-color: #404040; }
    [data-theme="dark"] .dashboard-tab { color: #a0a0a0; }
    [data-theme="dark"] .dashboard-tab:hover { color: #5b8dd9; }
    [data-theme="dark"] .dashboard-tab.active { color: #5b8dd9; border-bottom-color: #5b8dd9; }
    [data-theme="dark"] .time-range-btn { background: #383838; border-color: #505050; color: #c0c0c0; }
    [data-theme="dark"] .time-range-btn:hover { border-color: #5b8dd9; color: #5b8dd9; }
    [data-theme="dark"] .time-range-btn.active { background: #5b8dd9; color: #fff; border-color: #5b8dd9; }
    [data-theme="dark"] .stat-card { background: #383838; border-color: #404040; }
    [data-theme="dark"] .stat-card .stat-value { color: #5b8dd9; }
    [data-theme="dark"] .stat-card .stat-label { color: #a0a0a0; }
    [data-theme="dark"] .no-data-hint { color: #6b6b6b; }
    [data-theme="dark"] .empty-state { color: #6b6b6b; }
    [data-theme="dark"] .loading { color: #6b6b6b; }
    [data-theme="dark"] .calendar-table th { background: #333; border-bottom-color: #505050; color: #c0c0c0; }
    [data-theme="dark"] .calendar-table td { border-bottom-color: #404040; }
    [data-theme="dark"] .calendar-table th:first-child { background: #333; }
    [data-theme="dark"] .calendar-table td:first-child { background: #2d2d2d; }
    [data-theme="dark"] .calendar-table .room-group-header { background: #353535; color: #e0e0e0; }
    [data-theme="dark"] .calendar-table .price-diff { background: #3d3520; }
    [data-theme="dark"] .calendar-table .avail-green { background: #1a3a1a; color: #52c41a; }
    [data-theme="dark"] .calendar-table .avail-yellow { background: #3d3520; color: #faad14; }
    [data-theme="dark"] .calendar-table .avail-red { background: #3d2020; color: #ff4d4f; }
    [data-theme="dark"] .calendar-table .avail-black { background: #2a2a2a; color: #666; }
    [data-theme="dark"] .dashboard-panel h4 { color: #e0e0e0; }
    [data-theme="dark"] .date-input { background: #383838; border-color: #505050; color: #e0e0e0; }
    [data-theme="dark"] .switch .slider { background: #505050; }
    [data-theme="dark"] .platform-card-header .platform-status.on { background: rgba(91,141,217,0.15); color: #5b8dd9; }
    [data-theme="dark"] .platform-card-header .platform-status.off { background: rgba(252,129,129,0.15); color: #fc8181; }
    [data-theme="dark"] .badge { background: #389e0d; }
    [data-theme="dark"] .badge.empty { background: #d48806; }

    /* ==================== 调度配置编辑器 ==================== */
    .schedule-toggle-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .schedule-toggle-btn:hover {
      color: #1890ff;
      border-color: #1890ff;
    }
    .schedule-toggle-btn .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }
    .schedule-toggle-btn .arrow.open {
      transform: rotate(90deg);
    }
    .schedule-editor {
      margin-top: 8px;
      padding: 12px;
      border: 1px solid #f0f0f0;
      border-radius: 6px;
      background: #fafafa;
      display: none;
    }
    .schedule-editor.open {
      display: block;
    }
    .schedule-type-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      overflow: hidden;
      width: fit-content;
    }
    .schedule-tab {
      padding: 6px 16px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: all 0.2s;
      outline: none;
    }
    .schedule-tab + .schedule-tab {
      border-left: 1px solid #d9d9d9;
    }
    .schedule-tab:hover {
      color: #1890ff;
      background: #e6f7ff;
    }
    .schedule-tab.active {
      background: #1890ff;
      color: #fff;
    }
    .schedule-controls {
      margin-bottom: 12px;
    }
    .schedule-interval-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .schedule-interval-row label {
      font-size: 13px;
      color: #555;
    }
    .schedule-interval-input {
      width: 80px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .schedule-interval-input:focus {
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }
    .schedule-unit-select {
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .schedule-unit-select:focus {
      border-color: #1890ff;
    }
    .schedule-time-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .schedule-time-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .schedule-time-item input[type="time"] {
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .schedule-time-item input[type="time"]:focus {
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }
    .schedule-add-btn {
      margin-top: 4px;
    }

    /* 爬取中指示器 */
    .crawling-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #1890ff;
      padding: 1px 6px;
      border-radius: 8px;
      background: #e6f7ff;
      white-space: nowrap;
    }
    .crawling-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1890ff;
      animation: crawl-pulse 1.2s ease-in-out infinite;
    }

  // ==================== Toast ====================
  function showToast(msg, type) {
    type = type || 'success';
    if (type === 'error') msg = friendlyAdminError(msg);
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.body.appendChild(el);
    requestAnimationFrame(function() { el.classList.add('show'); });
    setTimeout(function() {
      el.classList.remove('show');
      setTimeout(function() { el.remove(); }, 300);
    }, 2000);
  }

  function friendlyAdminError(msg) {
    var s = String(msg || '');
    if (s.indexOf('ECONNREFUSED') >= 0) return '数据库连接失败，请检查数据库配置';
    if (s.indexOf('ACCESS_DENIED') >= 0 || s.indexOf('ER_ACCESS_DENIED') >= 0) return '数据库认证失败，请检查用户名密码';
    if (s.indexOf('ETIMEDOUT') >= 0 || s.indexOf('timeout') >= 0) return '连接超时，请稍后重试';
    if (s.indexOf('ENOTFOUND') >= 0) return '无法解析服务器地址，请检查网络';
    if (s.indexOf('ECONNRESET') >= 0) return '连接被重置，请重试';
    if (s.indexOf('ER_NO_SUCH_TABLE') >= 0) return '数据表不存在，请检查数据库';
    if (s.indexOf('fetch') >= 0 || s.indexOf('network') >= 0) return '网络请求失败，请检查网络';
    return s;
  }

  async function loadData() {
    // 从 MySQL 加载本店配置 + 竞品列表（按 user_id 隔离）
    if (hotelConfigApi) {
      try {
        hotelConfig = await hotelConfigApi.get();
      } catch (e) {
        console.error('加载本店配置失败:', e);
      }
    }
    // Memory API 加载旧数据（仅作为只读参考，不自动迁移，避免跨用户数据泄漏）
    if (api) {
      try {
        var ownResult = await api.retrieve({ type: 'own_hotel', limit: 1 });
        if (ownResult.success && ownResult.data && ownResult.data.length > 0) {
          ownHotel = ownResult.data[0];
        }
      } catch (e) {
        console.error('加载Memory数据失败:', e);
      }
    }
    if (competitorApi) {
      try {
        competitors = await competitorApi.list();
      } catch (e) {
        console.error('加载竞品列表失败:', e);
      }
    }
    if (roomTypesApi) {
      try {
        canonicalRoomTypes = await roomTypesApi.list();
      } catch (e) {
        console.error('加载标准房型失败:', e);
      }
      try {
        roomMappingData = await roomTypesApi.getMappings();
      } catch (e) {
        console.error('加载房型映射失败:', e);
      }
    }
    // 加载心跳任务
    if (heartbeatApi) {
      try {
        heartbeatTasks = await heartbeatApi.getTasks();
      } catch (e) {
        console.error('加载心跳任务失败:', e);
      }
      // 获取当前正在执行的任务
      try {
        var executing = await heartbeatApi.getExecutingTasks();
        executingTaskIds = new Set(executing);
      } catch (e) {
        console.error('获取执行状态失败:', e);
      }
    }
    isLoading = false;
    renderContent();
  }

  // ==================== 任务执行状态实时监听 ====================
  if (heartbeatApi && heartbeatApi.onTaskStatus) {
    heartbeatApi.onTaskStatus(function(data) {
      if (data.status === 'running') {
        executingTaskIds.add(data.taskId);
      } else {
        executingTaskIds.delete(data.taskId);
      }
      // 只更新指示器，不重新渲染整个页面
      updateCrawlingIndicators();
    });
  }

  function updateCrawlingIndicators() {
    for (var i = 0; i < heartbeatTasks.length; i++) {
      var taskId = heartbeatTasks[i].id;
      var el = document.getElementById('crawl-status-' + taskId);
      if (el) {
        if (executingTaskIds.has(taskId)) {
          el.style.display = 'inline-flex';
        } else {
          el.style.display = 'none';
        }
      }
    }
  }

  // ==================== 本店操作 ====================
  async function saveOwnHotel() {
    var input = document.getElementById('ownHotelName');
    var name = input ? input.value.trim() : '';
    if (!name) { showToast(t('admin.enterHotelName'), 'error'); return; }

    try {
      // 保存到 MySQL（按 user_id 隔离）
      await hotelConfigApi.save({ hotelName: name });
      hotelConfig = await hotelConfigApi.get();
      showToast(t('admin.ownSaved'));
      renderContent();
    } catch (e) { showToast(t('admin.saveFailed') + ': ' + e.message, 'error'); }
  }

  // 自动解析本店位置
  async function resolveOwnLocation() {
    var name = hotelConfig && hotelConfig.hotel_name;
    if (!name) { showToast('请先保存酒店名称', 'error'); return; }

    var btn = document.getElementById('btnResolveLocation');
    if (btn) { btn.disabled = true; btn.textContent = '定位中...'; }

    try {
      var loc = await competitorApi.resolveLocation(name);
      if (loc) {
        await hotelConfigApi.save({ address: loc.address, lat: loc.lat, lng: loc.lng, amapPoiId: loc.amapPoiId || null });
        hotelConfig = await hotelConfigApi.get();
        showToast('定位成功：' + loc.address);
        renderContent();
      } else {
        showToast('未找到该酒店位置，请检查名称', 'error');
      }
    } catch (e) {
      showToast('定位失败: ' + e.message, 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '自动定位'; }
    }
  }

  // ==================== 竞品操作 ====================

  // 搜索周边酒店
  async function searchNearby() {
    if (!hotelConfig || !hotelConfig.lat || !hotelConfig.lng) {
      showToast('请先定位本店位置', 'error');
      return;
    }

    var radiusSelect = document.getElementById('searchRadius');
    if (radiusSelect) searchRadius = parseInt(radiusSelect.value);

    isSearching = true;
    renderSearchResults();

    try {
      nearbyResults = await competitorApi.searchNearby(hotelConfig.lat, hotelConfig.lng, searchRadius);
      // 过滤掉本店自身（通过 amap_poi_id 或名称匹配）
      nearbyResults = nearbyResults.filter(function(h) {
        if (hotelConfig.amap_poi_id && h.amapPoiId === hotelConfig.amap_poi_id) return false;
        if (h.name === hotelConfig.hotel_name) return false;
        return true;
      });
      // 标记已添加的竞品
      var addedPoiIds = new Set(competitors.map(function(c) { return c.amap_poi_id; }).filter(Boolean));
      var addedNames = new Set(competitors.map(function(c) { return c.name; }));
      nearbyResults.forEach(function(h) {
        h._added = addedPoiIds.has(h.amapPoiId) || addedNames.has(h.name);
      });
    } catch (e) {
      showToast('搜索失败: ' + e.message, 'error');
      nearbyResults = [];
    }

    isSearching = false;
    renderSearchResults();
  }

  // 添加选中的竞品
  async function addSelectedCompetitors() {
    var checkboxes = document.querySelectorAll('.nearby-checkbox:checked');
    if (checkboxes.length === 0) { showToast('请先勾选要添加的竞品', 'error'); return; }

    var added = 0;
    for (var i = 0; i < checkboxes.length; i++) {
      var idx = parseInt(checkboxes[i].dataset.idx);
      var h = nearbyResults[idx];
      if (!h || h._added) continue;
      try {
        await competitorApi.add({
          name: h.name,
          amapPoiId: h.amapPoiId,
          address: h.address,
          lat: h.lat,
          lng: h.lng,
          distanceMeters: h.distance
        });
        h._added = true;
        added++;
      } catch (e) {
        console.error('添加竞品失败:', h.name, e);
      }
    }

    if (added > 0) {
      competitors = await competitorApi.list();
      showToast('已添加 ' + added + ' 家竞品，正在后台解析平台ID...');
      renderSearchResults();
      renderCompetitorList();

      // 自动触发竞品平台ID解析（后台异步执行）
      try {
        await competitorApi.resolvePlatformIds();
      } catch (e) {
        console.warn('触发平台ID解析失败:', e);
      }
    }
  }

  async function removeCompetitor(id, name) {
    if (!confirm(t('admin.confirmDelete') + '「' + name + '」？')) return;
    try {
      await competitorApi.remove(id);
      competitors = await competitorApi.list();
      showToast(t('admin.deleted'));
      // 更新搜索结果中的已添加标记
      var addedPoiIds = new Set(competitors.map(function(c) { return c.amap_poi_id; }).filter(Boolean));
      nearbyResults.forEach(function(h) {
        h._added = addedPoiIds.has(h.amapPoiId);
      });
      nameSearchResults.forEach(function(h) {
        h._added = addedPoiIds.has(h.amapPoiId);
      });
      renderContent();
    } catch (e) { showToast(t('admin.deleteFailed') + ': ' + e.message, 'error'); }

  // ─── 房型映射表格 ───
  var PLATFORMS = ['ctrip', 'meituan', 'trip', 'booking'];
  var PLATFORM_LABELS = { ctrip: '携程', meituan: '美团', trip: 'Trip.com', booking: 'Booking' };

  function buildMappingRows() {
    // 从 canonicalRoomTypes + roomMappingData 构建表格行数据
    var rows = [];
    for (var i = 0; i < canonicalRoomTypes.length; i++) {
      var name = canonicalRoomTypes[i];
      var row = { canonicalName: name };
      for (var j = 0; j < PLATFORMS.length; j++) {
        var p = PLATFORMS[j];
        // 查找该统一名称在该平台的映射（platform 可能是 ctrip-public/ctrip-backend，统一匹配前缀）
        var found = roomMappingData.find(function(m) {
          return m.canonical_name === name && (m.platform === p || m.platform.startsWith(p + '-'));
        });
        row[p] = found ? found.platform_room_name : '';
      }
      rows.push(row);
    }
    return rows;
  }

  function renderRoomMappingTable() {
    var el = document.getElementById('roomMappingTableContainer');
    if (!el) return;

    var rows = buildMappingRows();

    var html = '';
    // 添加房型按钮
    html += '<div style="display:flex;gap:8px;margin-bottom:12px;">';
    html += '<input type="text" class="form-input" id="newRoomTypeName" placeholder="输入统一房型名称，如：豪华大床房" style="flex:1;"';
    html += ' onkeydown="if(event.key===\'Enter\')addMappingRow()">';
    html += '<button class="btn btn-primary" onclick="addMappingRow()">添加房型</button>';
    html += '</div>';

    if (rows.length === 0) {
      html += '<div style="color:#999;font-size:13px;padding:12px 0;">暂未配置房型，请先添加统一房型名称</div>';
      el.innerHTML = html;
      return;
    }

    // 表格
    html += '<div style="overflow-x:auto;">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
    html += '<thead><tr style="background:#f8f9fa;">';
    html += '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #e8e8e8;white-space:nowrap;">统一名称</th>';
    for (var j = 0; j < PLATFORMS.length; j++) {
      html += '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #e8e8e8;white-space:nowrap;">' + PLATFORM_LABELS[PLATFORMS[j]] + '</th>';
    }
    html += '<th style="padding:8px 10px;border-bottom:2px solid #e8e8e8;width:40px;"></th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      html += '<tr style="border-bottom:1px solid #f0f0f0;">';
      html += '<td style="padding:6px 10px;font-weight:500;color:#1890ff;white-space:nowrap;">' + escapeHtml(row.canonicalName) + '</td>';
      for (var j = 0; j < PLATFORMS.length; j++) {
        var p = PLATFORMS[j];
        var val = row[p] || '';
        html += '<td style="padding:4px 6px;">';
        html += '<input type="text" class="form-input mapping-input" data-row="' + i + '" data-platform="' + p + '"';
        html += ' value="' + escapeHtml(val) + '" placeholder="' + PLATFORM_LABELS[p] + '房型名"';
        html += ' style="width:100%;padding:4px 8px;font-size:12px;border:1px solid #d9d9d9;border-radius:3px;">';
        html += '</td>';
      }
      html += '<td style="padding:4px 6px;text-align:center;">';
      html += '<span style="cursor:pointer;color:#ff4d4f;font-size:16px;" onclick="removeMappingRow(\'' + escapeHtml(row.canonicalName).replace(/'/g, "\\'") + '\')" title="删除该房型">×</span>';
      html += '</td>';
      html += '</tr>';
    }

    html += '</tbody></table></div>';

    // 保存按钮
    html += '<div style="margin-top:12px;text-align:right;">';
    html += '<button class="btn btn-primary" onclick="saveMappingTable()">保存映射</button>';
    html += '</div>';

    el.innerHTML = html;
  }

  async function addMappingRow() {
    var input = document.getElementById('newRoomTypeName');
    var name = input && input.value.trim();
    if (!name) { showToast('请输入统一房型名称', 'error'); return; }
    if (canonicalRoomTypes.includes(name)) { showToast('该房型已存在', 'error'); return; }
    if (!roomTypesApi) { showToast('API 不可用', 'error'); return; }

    try {
      await roomTypesApi.add(name);
      canonicalRoomTypes.push(name);
      input.value = '';
      renderRoomMappingTable();
      showToast('已添加：' + name);
    } catch (e) {
      showToast('添加失败：' + e.message, 'error');
    }
  }

  async function removeMappingRow(name) {
    if (!roomTypesApi) return;
    try {
      await roomTypesApi.remove(name);
      canonicalRoomTypes = canonicalRoomTypes.filter(function(n) { return n !== name; });
      roomMappingData = roomMappingData.filter(function(m) { return m.canonical_name !== name; });
      renderRoomMappingTable();
      showToast('已删除：' + name);
    } catch (e) {
      showToast('删除失败：' + e.message, 'error');
    }
  }

  async function saveMappingTable() {
    if (!roomTypesApi) { showToast('API 不可用', 'error'); return; }

    // 从表格 input 中收集所有映射
    var inputs = document.querySelectorAll('.mapping-input');
    var mappings = [];
    var rows = buildMappingRows();

    for (var k = 0; k < inputs.length; k++) {
      var inp = inputs[k];
      var rowIdx = parseInt(inp.getAttribute('data-row'));
      var platform = inp.getAttribute('data-platform');
      var val = inp.value.trim();
      if (val && rows[rowIdx]) {
        mappings.push({
          canonicalName: rows[rowIdx].canonicalName,
          platform: platform,
          platformRoomName: val
        });
      }
    }

    try {
      await roomTypesApi.saveMappings(mappings);
      // 更新本地状态
      roomMappingData = mappings.map(function(m) {
        return { canonical_name: m.canonicalName, platform: m.platform, platform_room_name: m.platformRoomName };
      });
      showToast('映射已保存（' + mappings.length + ' 条）');
    } catch (e) {
      showToast('保存失败：' + e.message, 'error');
    }
  }

  async function toggleTask(taskId, enabled) {
    if (!heartbeatApi) return;

    // 启用时检查平台限制
    if (enabled) {
      var targetPlatform = extractPlatform(taskId);
      var enabledPlatforms = getEnabledPlatforms();
      if (!enabledPlatforms.has(targetPlatform) && enabledPlatforms.size >= MAX_ENABLED_PLATFORMS) {
        showToast(t('admin.platformLimitReached'), 'error');
        renderContent();
        return;
      }
    }

    try {
      await heartbeatApi.updateTask(taskId, { enabled: enabled });
      // 更新本地状态
      for (var i = 0; i < heartbeatTasks.length; i++) {
        if (heartbeatTasks[i].id === taskId) {
          heartbeatTasks[i].enabled = enabled;
          break;
        }
      }
      showToast(enabled ? t('admin.enabled') : t('admin.disabled'));
      renderContent();
    } catch (e) {
      showToast(t('admin.operationFailed') + ': ' + e.message, 'error');
    }
  }

    html += '<button class="schedule-tab' + (sType === 'fixed-time' ? ' active' : '') + '" data-type="fixed-time" onclick="switchScheduleType(\'' + taskId + '\', \'fixed-time\')">' + t('admin.scheduleFixedTime') + '</button>';

  function buildTimeSelectHtml(selectedHour, selectedMinute) {
    var hSel = '<select class="schedule-hour-select schedule-unit-select">';
    for (var h = 0; h < 24; h++) {
      var hStr = h.toString().padStart(2, '0');
      hSel += '<option value="' + hStr + '"' + (hStr === selectedHour ? ' selected' : '') + '>' + hStr + '</option>';
    }
    hSel += '</select>';
    var mSel = '<select class="schedule-minute-select schedule-unit-select">';
    for (var m = 0; m < 60; m++) {
      var mStr = m.toString().padStart(2, '0');
      mSel += '<option value="' + mStr + '"' + (mStr === selectedMinute ? ' selected' : '') + '>' + mStr + '</option>';
    }
    mSel += '</select>';
    return hSel + ' <span style="color:#999;">:</span> ' + mSel;

    for (var i = 0; i < times.length; i++) {

    for (var i = 0; i < tabs.length; i++) {

    var items = list.querySelectorAll('.schedule-time-item');

  function saveSchedule(taskId) {
    var editor = document.getElementById('schedule-' + taskId);
    if (!editor) return;

    // Determine active schedule type
    var activeTab = editor.querySelector('.schedule-tab.active');
    var scheduleType = activeTab ? activeTab.getAttribute('data-type') : 'interval';

    var config;
    if (scheduleType === 'interval') {
      var valInput = document.getElementById('interval-value-' + taskId);
      var unitSelect = document.getElementById('interval-unit-' + taskId);
      config = {
        value: parseInt(valInput.value, 10),
        unit: unitSelect.value
      };
    } else {
      var timeItems = editor.querySelectorAll('.schedule-time-item');
      var times = [];
      for (var i = 0; i < timeItems.length; i++) {
        var hSelect = timeItems[i].querySelector('.schedule-hour-select');
        var mSelect = timeItems[i].querySelector('.schedule-minute-select');
        if (hSelect && mSelect) {
          times.push(hSelect.value + ':' + mSelect.value);
        }
      }
      config = { times: times };
    }

    // Validate
    var validation = validateScheduleConfig(scheduleType, config);
    if (!validation.valid) {
      showToast(validation.error, 'error');
      return;
    }

    // Build cron
    var cron = buildCronFromConfig(scheduleType, config);

    // Call IPC
    if (!heartbeatApi) {
      showToast(t('admin.scheduleUpdateFailed'), 'error');
      return;
    }

    heartbeatApi.updateTask(taskId, {
      cron: cron,
      scheduleType: scheduleType,
      scheduleConfig: config
    }).then(function() {
      // Update local state
      for (var i = 0; i < heartbeatTasks.length; i++) {
        if (heartbeatTasks[i].id === taskId) {
          heartbeatTasks[i].cron = cron;
          heartbeatTasks[i].scheduleType = scheduleType;
          heartbeatTasks[i].scheduleConfig = config;
          break;
        }
      }
      showToast(t('admin.scheduleUpdated'));
      renderContent();
    }).catch(function(e) {
      showToast(t('admin.scheduleUpdateFailed') + ': ' + e.message, 'error');
    });
  }

  function buildCronFromConfig(scheduleType, config) {
    if (scheduleType === 'interval') {
      if (config.unit === 'minutes') {
        return '*/' + config.value + ' * * * *';
      } else {
        return '0 */' + config.value + ' * * *';
      }
    } else {
      // fixed-time
      var hours = config.times.map(function(t) { return parseInt(t.split(':')[0]); });
      var minutes = config.times.map(function(t) { return parseInt(t.split(':')[1]); });
      var allSameMinute = minutes.every(function(m) { return m === minutes[0]; });
      if (allSameMinute) {
        return minutes[0] + ' ' + hours.join(',') + ' * * *';
      } else {
        return '0 ' + hours.join(',') + ' * * *';
      }
    }
  }

  function parseScheduleFromTask(task) {
    return { scheduleType: task.scheduleType, config: task.scheduleConfig };
  }

  function validateScheduleConfig(scheduleType, config) {
    if (scheduleType === 'interval') {
      if (!Number.isInteger(config.value) || config.value < 1) {
        return { valid: false, error: t('admin.scheduleErrorPositiveInt') || '间隔值必须为正整数' };
      }
      if (config.unit === 'minutes' && config.value > 59) {
        return { valid: false, error: t('admin.scheduleErrorMinutesMax') || '分钟间隔不能超过 59' };
      }
      if (config.unit === 'hours' && config.value > 23) {
        return { valid: false, error: t('admin.scheduleErrorHoursMax') || '小时间隔不能超过 23' };
      }
      return { valid: true };
    }
    // fixed-time
    if (!Array.isArray(config.times) || config.times.length === 0) {
      return { valid: false, error: t('admin.scheduleErrorNoTime') || '至少需要一个时间点' };
    }
    var timeRegex = /^([01]\d|2[0-3]):([0-5]\d)$/;
    for (var i = 0; i < config.times.length; i++) {
      if (!timeRegex.test(config.times[i])) {
        return { valid: false, error: (t('admin.scheduleErrorInvalidTime') || '无效时间格式') + ': ' + config.times[i] };
      }
    }
    var uniqueTimes = new Set(config.times);
    if (uniqueTimes.size !== config.times.length) {
      return { valid: false, error: t('admin.scheduleErrorDuplicate') || '时间点不能重复' };
    }
    return { valid: true };
  }

  // ==================== 数据面板 ====================

  function todayStr() {
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + dd;
  }

  function addDays(dateStr, n) {
    var d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + dd;
  }

  function getStartTime(days) {
    var d = new Date();
    d.setDate(d.getDate() - (days - 1));
    d.setHours(0, 0, 0, 0);
    return d.toISOString().replace('T', ' ').substring(0, 19);
  }

  var CHART_COLORS = [
    '#1890ff', '#52c41a', '#faad14', '#f5222d', '#722ed1',
    '#13c2c2', '#eb2f96', '#fa8c16', '#2f54eb', '#a0d911'
  ];

  function destroyCharts() {

  function formatTime(val) {
    if (!val || val === '0' || val === 0) return currentLang === 'en' ? 'Unknown' : '未知';
    var str = String(val).replace('T', ' ').replace('Z', '');
    var parts = str.split(' ');
    if (parts.length < 2) return str;
    return parts[0].substring(5) + ' ' + parts[1].substring(0, 5);
  }

  var WEEKDAYS_ZH = ['周日','周一','周二','周三','周四','周五','周六'];
  var WEEKDAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function formatDateHeader(dateStr) {
    if (!dateStr) return '-';
    var s = normalizeDate(dateStr);
    var parts = s.split('-');
    if (parts.length !== 3) return s;
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    if (isNaN(d.getTime())) return s;
    var weekday = currentLang === 'en' ? WEEKDAYS_EN[d.getDay()] : WEEKDAYS_ZH[d.getDay()];
    var isToday = s === todayStr();
    var isWeekend = d.getDay() === 0 || d.getDay() === 6;
    var color = isToday ? '#1890ff' : (isWeekend ? '#f5222d' : '#333');
    return '<span style="color:' + color + ';font-weight:' + (isToday ? 'bold' : 'normal') + '">' + weekday + '<br>' + parts[1] + '/' + parts[2] + '</span>';
  }

  function formatDateShort(dateStr) {
    if (!dateStr) return '-';
    var s = normalizeDate(dateStr);
    return s.substring(5); // MM-DD
  }

  // mysql2 返回 DATE 类型时可能是 Date 对象，统一转成 YYYY-MM-DD 字符串
  function normalizeDate(val) {
    if (!val) return '';
    if (val instanceof Date) {
      var y = val.getFullYear();
      var m = String(val.getMonth() + 1).padStart(2, '0');
      var d = String(val.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + d;
    }
    return String(val).substring(0, 10);
  }

      { startDays: -3, endDays: 7, label: currentLang === 'en' ? 'Recent' : '近期' },
      { startDays: 0, endDays: 0, label: t('admin.today') },
      { startDays: 0, endDays: 7, label: t('admin.next7days') },
      { startDays: 0, endDays: 14, label: t('admin.next14days') },
      { startDays: 0, endDays: 30, label: t('admin.next30days') }
    ];

    var panels = TAB_PANELS[dashboardState.platform] || TAB_PANELS['all'];

    var html = '<div class="content-card">';
    // tabs
    html += '<div class="dashboard-tabs">';
    for (var i = 0; i < tabs.length; i++) {
      var tb = tabs[i];
      html += '<button class="dashboard-tab' + (tb.id === dashboardState.platform ? ' active' : '') +
        '" data-platform="' + tb.id + '">' + tb.label + '</button>';
    }
    html += '</div>';

    // date range bar
    html += '<div class="date-range-bar">';
    for (var j = 0; j < dateRanges.length; j++) {
      var dr = dateRanges[j];
      var isActive = (addDays(todayStr(), dr.startDays) === dashboardState.dateStart && addDays(todayStr(), dr.endDays) === dashboardState.dateEnd);
      html += '<button class="time-range-btn" data-start="' + dr.startDays + '" data-end="' + dr.endDays + '"' +
        (isActive ? ' style="background:#1890ff;color:#fff;"' : '') + '>' + dr.label + '</button>';
    }
    html += ' <input type="date" class="date-input" id="dashDateStart" value="' + dashboardState.dateStart + '">';
    html += ' ~ <input type="date" class="date-input" id="dashDateEnd" value="' + dashboardState.dateEnd + '">';
    html += '</div>';

    // panels — 根据 tab 决定显示哪些
    if (panels.priceCalendar) {
      html += '<div id="dashPriceCalendar" class="dashboard-panel"><div class="loading">' + t('admin.loadingData') + '</div></div>';
    }
    if (panels.roomCalendar) {
      html += '<div id="dashRoomCalendar" class="dashboard-panel"><div class="loading">' + t('admin.loadingData') + '</div></div>';
    }
    if (panels.trend) {
      html += '<div id="dashTrendChart" class="dashboard-panel"></div>';
    }
    html += '</div>';

    container.innerHTML = html;

    // bind tab clicks
    container.querySelectorAll('.dashboard-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        dashboardState.platform = btn.dataset.platform;
        renderDashboard(container);
      });
    });
    container.querySelectorAll('.time-range-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var startDays = parseInt(btn.dataset.start);
        var endDays = parseInt(btn.dataset.end);
        dashboardState.dateStart = addDays(todayStr(), startDays);
        dashboardState.dateEnd = addDays(todayStr(), endDays);
        renderDashboard(container);
      });
    });
    var startInput = document.getElementById('dashDateStart');
    var endInput = document.getElementById('dashDateEnd');
    if (startInput) startInput.addEventListener('change', function() {
      dashboardState.dateStart = startInput.value;
      loadDashboardData();
    });
    if (endInput) endInput.addEventListener('change', function() {
      dashboardState.dateEnd = endInput.value;
      loadDashboardData();
    });

    loadDashboardData();
  }

  async function loadDashboardData() {
    destroyCharts();
    var panels = TAB_PANELS[dashboardState.platform] || TAB_PANELS['all'];
    var tab = dashboardState.platform;

    try {
      // 价格日历
      if (panels.priceCalendar) {
        var priceArea = document.getElementById('dashPriceCalendar');
        if (priceArea) {
          var priceData = await dashboardApi.getPriceCalendar(dashboardState.dateStart, dashboardState.dateEnd);
          priceData = filterByTab(priceData, tab);
          renderPriceCalendar(priceArea, priceData);
        }
      }

      // 房态日历
      if (panels.roomCalendar) {
        var roomArea = document.getElementById('dashRoomCalendar');
        if (roomArea) {
          var roomData = await dashboardApi.getRoomCalendar(dashboardState.dateStart, dashboardState.dateEnd);
          roomData = filterByTab(roomData, tab);
          if (tab === 'pms') {
            renderPmsForecast(roomArea, roomData);
          } else {
            renderRoomCalendar(roomArea, roomData);
          }
        }
      }

      // 趋势图
      if (panels.trend) {
        var trendArea = document.getElementById('dashTrendChart');
        if (trendArea) {
          var startTime = getStartTime(dashboardState.snapshotRange);
          var snapData = await dashboardApi.getPriceSnapshots(startTime);
          snapData = filterByTab(snapData, tab);
          renderTrendChart(trendArea, snapData);
        }
      }
    } catch (e) {
      var errArea = document.getElementById('dashPriceCalendar') || document.getElementById('dashRoomCalendar');
      if (errArea) errArea.innerHTML = '<div class="no-data-hint">' + t('admin.loadFailed') + ': ' + e.message + '</div>';
    }
  }

  // ---- 价格日历表格 ----
  function renderPriceCalendar(area, data) {
    if (!data || data.length === 0) {
      area.innerHTML = '<div class="dashboard-panel"><h4>' + t('admin.priceCalendar') + '</h4>' +
        '<div class="no-data-hint">' + t('admin.noPriceCalendarData') + '</div></div>';
      return;
    }

    // 按 hotel_name 分组（本店 + 各竞品）
    var hotelGroups = {}; // hotel_name → [records]
    var hotelOrder = [];  // 保持顺序：本店在前
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var hName = d.hotel_name || '本店';
      if (!hotelGroups[hName]) {
        hotelGroups[hName] = [];
        hotelOrder.push(hName);
      }
      hotelGroups[hName].push(d);
    }

    var html = '';

    for (var hi = 0; hi < hotelOrder.length; hi++) {
      var hotelName = hotelOrder[hi];
      var hotelData = hotelGroups[hotelName];
      var isOwn = hotelData[0] && (hotelData[0].hotel_id === 0 || hotelData[0].hotel_id == null);

      // 收集该酒店的日期列
      var dateSet = {};
      var dates = [];
      var groupMap = {};
      for (var j = 0; j < hotelData.length; j++) {
        var d = hotelData[j];
        var dateStr = d.date ? normalizeDate(d.date) : null;
        if (!dateStr) continue;
        if (!dateSet[dateStr]) { dateSet[dateStr] = true; dates.push(dateStr); }

        var displayName = d.display_name || d.room_name;
        if (!groupMap[displayName]) groupMap[displayName] = { platforms: {} };
        var basePlatform = d.platform;
        if (!groupMap[displayName].platforms[basePlatform]) {
          groupMap[displayName].platforms[basePlatform] = { dates: {} };
        }
        groupMap[displayName].platforms[basePlatform].dates[dateStr] = d;
      }
      dates.sort();

      var sectionColor = isOwn ? '#1890ff' : '#fa8c16';
      var sectionIcon = isOwn ? '🏨' : '🏢';

      html += '<div class="dashboard-panel" style="border-left:3px solid ' + sectionColor + ';margin-bottom:16px;">';
      html += '<h4 style="margin:0 0 10px 0;">' + sectionIcon + ' ' + escapeHtml(hotelName) + '</h4>';

      if (dates.length === 0) {
        html += '<div class="no-data-hint">暂无价格数据</div>';
        html += '</div>';
        continue;
      }

      html += '<div style="overflow-x:auto"><table class="calendar-table">';
      html += '<thead><tr><th>' + t('admin.roomType') + '</th>';
      for (var di = 0; di < dates.length; di++) {
        var isToday = dates[di] === todayStr();
        html += '<th' + (isToday ? ' style="background:#e6f7ff;"' : '') + '>' + formatDateHeader(dates[di]) + '</th>';
      }
      html += '</tr></thead><tbody>';

      var groupNames = Object.keys(groupMap).sort();
      for (var gi = 0; gi < groupNames.length; gi++) {
        var gName = groupNames[gi];
        var group = groupMap[gName];
        var platformKeys = Object.keys(group.platforms);

        if (platformKeys.length === 1) {
          var pk = platformKeys[0];
          var pl = PLATFORM_SHORT_LABEL[pk] || platformLabels[pk] || pk;
          html += '<tr><td>' + escapeHtml(gName) + ' <span style="color:#999;font-size:11px">(' + pl + ')</span></td>';
          for (var dj = 0; dj < dates.length; dj++) {
            var rec = group.platforms[pk].dates[dates[dj]];
            html += buildPriceCell(rec, dates[dj]);
          }
          html += '</tr>';
        } else {
          html += '<tr class="room-group-header"><td colspan="' + (dates.length + 1) + '">' + escapeHtml(gName) + '</td></tr>';
          for (var pi = 0; pi < platformKeys.length; pi++) {
            var ppk = platformKeys[pi];
            var ppl = PLATFORM_SHORT_LABEL[ppk] || platformLabels[ppk] || ppk;
            html += '<tr class="sub-row"><td>' + ppl + '</td>';
            for (var dk = 0; dk < dates.length; dk++) {
              var prec = group.platforms[ppk].dates[dates[dk]];
              html += buildPriceCell(prec, dates[dk]);
            }
            html += '</tr>';
          }
        }
      }
      html += '</tbody></table></div></div>';
    }

    area.innerHTML = html;
  }

  function buildPriceCell(rec, dateStr) {
    var isToday = dateStr && dateStr === todayStr();
    var bgStyle = isToday ? ' style="background:#e6f7ff;"' : '';
    if (!rec || rec.price == null) return '<td class="price-cell"' + bgStyle + '>-</td>';
    var price = Number(rec.price);
    var tooltip = '';
    if (rec.cost != null) tooltip += (currentLang === 'en' ? 'Cost: ' : '底价: ') + rec.cost;
    if (rec.breakfast) tooltip += (tooltip ? ' | ' : '') + rec.breakfast;
    if (rec.available != null) {
      var avail = rec.available ? (currentLang === 'en' ? 'Available' : '可售') : (currentLang === 'en' ? 'Closed' : '关房');
      tooltip += (tooltip ? ' | ' : '') + avail;
    }
    if (rec.plan_name) tooltip += (tooltip ? ' | ' : '') + rec.plan_name;

    var html = '<td class="price-cell"' + bgStyle + '>';
    if (price > 0) {
      html += (rec.currency === 'USD' ? '$' : '¥') + price;
    } else {
      html += '-';
    }
    if (tooltip) {
      html += '<span class="price-tooltip">' + escapeHtml(tooltip) + '</span>';
    }
    html += '</td>';
    return html;
  }

  // ---- 房态日历表格 ----
  function renderRoomCalendar(area, data) {
    if (!data || data.length === 0) {
      area.innerHTML = '<div class="dashboard-panel"><h4>' + t('admin.roomCalendar') + '</h4>' +
        '<div class="no-data-hint">' + t('admin.noRoomCalendarData') + '</div></div>';
      return;
    }

    var dateSet = {};
    var dates = [];
    // 按 display_name 分组 → 下级按 platform 分组
    var groupMap = {}; // display_name → { platforms: { platform → { dates: { date → record }, hasPmsMetrics } } }
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var dateStr = d.date ? normalizeDate(d.date) : null;
      if (!dateStr) continue;
      if (!dateSet[dateStr]) { dateSet[dateStr] = true; dates.push(dateStr); }

      var displayName = d.display_name || d.room_name;
      if (!groupMap[displayName]) groupMap[displayName] = { platforms: {} };
      var plat = d.platform;
      if (!groupMap[displayName].platforms[plat]) {
        groupMap[displayName].platforms[plat] = { dates: {}, hasPmsMetrics: false };
      }
      groupMap[displayName].platforms[plat].dates[dateStr] = d;
      if (d.occupancy_rate != null || d.adr != null) {
        groupMap[displayName].platforms[plat].hasPmsMetrics = true;
      }
    }
    dates.sort();

    var html = '<div class="dashboard-panel"><h4>' + t('admin.roomCalendar') + '</h4>';
    html += '<div style="overflow-x:auto"><table class="calendar-table">';
    html += '<thead><tr><th>' + t('admin.roomType') + '</th>';
    for (var di = 0; di < dates.length; di++) {
      html += '<th>' + formatDateShort(dates[di]) + '</th>';
    }
    html += '</tr></thead><tbody>';

    var groupNames = Object.keys(groupMap).sort();
    for (var gi = 0; gi < groupNames.length; gi++) {
      var gName = groupNames[gi];
      var group = groupMap[gName];
      var platKeys = Object.keys(group.platforms);

      if (platKeys.length === 1) {
        // 单平台：一行搞定
        var pk = platKeys[0];
        var platData = group.platforms[pk];
        var pl = PLATFORM_SHORT_LABEL[pk] || platformLabels[pk] || pk;
        html += '<tr><td>' + escapeHtml(gName) + ' <span style="color:#999;font-size:11px">(' + pl + ')</span></td>';
        for (var dj = 0; dj < dates.length; dj++) {
          html += buildRoomCell(platData.dates[dates[dj]]);
        }
        html += '</tr>';

        // PMS 指标子行（入住率/ADR/RevPAR）
        if (platData.hasPmsMetrics) {
          html += buildPmsMetricRows(platData.dates, dates);
        }
      } else {
        // 多平台：先房型名，再各平台子行
        html += '<tr class="room-group-header"><td colspan="' + (dates.length + 1) + '">' + escapeHtml(gName) + '</td></tr>';
        for (var pi = 0; pi < platKeys.length; pi++) {
          var ppk = platKeys[pi];
          var ppData = group.platforms[ppk];
          var ppl = PLATFORM_SHORT_LABEL[ppk] || platformLabels[ppk] || ppk;
          html += '<tr class="sub-row"><td>' + ppl + '</td>';
          for (var dk = 0; dk < dates.length; dk++) {
            html += buildRoomCell(ppData.dates[dates[dk]]);
          }
          html += '</tr>';

          if (ppData.hasPmsMetrics) {
            html += buildPmsMetricRows(ppData.dates, dates);
          }
        }
      }
    }
    html += '</tbody></table></div></div>';
    area.innerHTML = html;
  }

  function buildPmsMetricRows(dateMap, dates) {
    var html = '';
    // 入住率
    html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">' + t('admin.occupancyRate') + '</td>';
    for (var i = 0; i < dates.length; i++) {
      var rec = dateMap[dates[i]];
      if (rec && rec.occupancy_rate != null) {
        html += '<td style="font-size:11px;color:#888">' + rec.occupancy_rate + '%</td>';
      } else {
        html += '<td>-</td>';
      }
    }
    html += '</tr>';
    // ADR
    html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">ADR</td>';
    for (var j = 0; j < dates.length; j++) {
      var aRec = dateMap[dates[j]];
      if (aRec && aRec.adr != null) {
        html += '<td style="font-size:11px;color:#888">¥' + aRec.adr + '</td>';
      } else {
        html += '<td>-</td>';
      }
    }
    html += '</tr>';
    // RevPAR
    html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">RevPAR</td>';
    for (var k = 0; k < dates.length; k++) {
      var rRec = dateMap[dates[k]];
      if (rRec && rRec.revpar != null) {
        html += '<td style="font-size:11px;color:#888">¥' + rRec.revpar + '</td>';
      } else {
        html += '<td>-</td>';
      }
    }
    html += '</tr>';
    return html;
  }

  function buildRoomCell(rec) {
    if (!rec) return '<td>-</td>';
    var avail = rec.available_rooms != null ? rec.available_rooms : null;
    var total = rec.total_rooms != null ? rec.total_rooms : null;
    if (avail == null) return '<td>-</td>';

    var ratio = total > 0 ? (avail / total) : 0;
    var cls = '';
    if (avail <= 0) cls = 'avail-black';
    else if (ratio < 0.2) cls = 'avail-red';
    else if (ratio < 0.5) cls = 'avail-yellow';
    else cls = 'avail-green';

    return '<td class="' + cls + '">' + avail + (total != null ? '/' + total : '') + '</td>';
  }

  // ---- PMS 房态预测（专用渲染） ----
  function renderPmsForecast(area, data) {
    if (!data || data.length === 0) {
      area.innerHTML = '<div class="dashboard-panel"><h4>' + t('admin.pmsForecast') + '</h4>' +
        '<div class="no-data-hint">' + t('admin.noRoomCalendarData') + '</div></div>';
      return;
    }

    var dateSet = {};
    var dates = [];
    var groupMap = {}; // roomName → { dates: { date → record } }
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var dateStr = d.date ? normalizeDate(d.date) : null;
      if (!dateStr) continue;
      if (!dateSet[dateStr]) { dateSet[dateStr] = true; dates.push(dateStr); }
      var name = d.display_name || d.room_name;
      if (!groupMap[name]) groupMap[name] = { dates: {} };
      groupMap[name].dates[dateStr] = d;
    }
    dates.sort();

    var html = '<div class="dashboard-panel"><h4>' + t('admin.pmsForecast') + '</h4>';
    html += '<div style="overflow-x:auto"><table class="calendar-table">';
    html += '<thead><tr><th>' + t('admin.roomType') + '</th>';
    for (var di = 0; di < dates.length; di++) {
      html += '<th>' + formatDateShort(dates[di]) + '</th>';
    }
    html += '</tr></thead><tbody>';

    var names = Object.keys(groupMap).sort();
    for (var gi = 0; gi < names.length; gi++) {
      var gName = names[gi];
      var gData = groupMap[gName].dates;

      // 可用/总房行
      html += '<tr><td style="font-weight:600">' + escapeHtml(gName) + '</td>';
      for (var dj = 0; dj < dates.length; dj++) {
        html += buildRoomCell(gData[dates[dj]]);
      }
      html += '</tr>';

      // 入住率
      html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">' + t('admin.occupancyRate') + '</td>';
      for (var dk = 0; dk < dates.length; dk++) {
        var rec = gData[dates[dk]];
        if (rec && rec.occupancy_rate != null) {
          var occVal = Number(rec.occupancy_rate);
          var occCls = occVal >= 80 ? 'avail-red' : (occVal >= 50 ? 'avail-yellow' : 'avail-green');
          html += '<td class="' + occCls + '" style="font-size:11px">' + occVal + '%</td>';
        } else {
          html += '<td>-</td>';
        }
      }
      html += '</tr>';

      // ADR
      html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">ADR</td>';
      for (var dl = 0; dl < dates.length; dl++) {
        var aRec = gData[dates[dl]];
        html += '<td style="font-size:11px;color:#888">' + (aRec && aRec.adr != null ? '¥' + aRec.adr : '-') + '</td>';
      }
      html += '</tr>';

      // RevPAR
      html += '<tr class="metric-row"><td style="padding-left:24px;font-size:11px;color:#888">RevPAR</td>';
      for (var dm = 0; dm < dates.length; dm++) {
        var rRec = gData[dates[dm]];
        html += '<td style="font-size:11px;color:#888">' + (rRec && rRec.revpar != null ? '¥' + rRec.revpar : '-') + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div></div>';
    area.innerHTML = html;
  }

  // ---- 趋势折线图 ----
  function renderTrendChart(area, data) {
    if (!data || data.length === 0) {
      area.innerHTML = '<div class="dashboard-panel"><h4>' + t('admin.priceTrend') + '</h4>' +
        '<div class="no-data-hint">' + (currentLang === 'en' ? 'No trend data' : '暂无趋势数据') + '</div></div>';
      return;
    }

    // group by "hotel_name - platform - room_name"
    var seriesMap = {};
    var timeLabels = [];
    var timeSet = {};
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var pLabel = PLATFORM_SHORT_LABEL[d.platform] || platformLabels[d.platform] || d.platform;
      var hLabel = d.hotel_name || '本店';
      var key = (d.hotel_id > 0 ? hLabel + ' · ' : '') + pLabel + ' - ' + d.room_name;
      if (!seriesMap[key]) seriesMap[key] = {};
      var ft = formatTime(d.snapshot_time);
      seriesMap[key][ft] = d.price;
      if (!timeSet[ft]) { timeSet[ft] = true; timeLabels.push(ft); }
    }

    var datasets = [];
    var keys = Object.keys(seriesMap);
    for (var k = 0; k < keys.length; k++) {
      var values = [];
      for (var ti = 0; ti < timeLabels.length; ti++) {
        values.push(seriesMap[keys[k]][timeLabels[ti]] || null);
      }
      datasets.push({
        label: keys[k],
        data: values,
        borderColor: CHART_COLORS[k % CHART_COLORS.length],
        backgroundColor: CHART_COLORS[k % CHART_COLORS.length] + '20',
        tension: 0.3,
        fill: false,
        pointRadius: 3
      });
    }

    var trendHtml = '<div class="dashboard-panel"><h4>' + t('admin.priceTrend') + '</h4>';
    // 趋势时间范围选择
    trendHtml += '<div class="time-range-bar">';
    var tRanges = [
      { days: 1, label: t('admin.today') },
      { days: 3, label: t('admin.last3days') },
      { days: 7, label: t('admin.last7days') }
    ];
    for (var j = 0; j < tRanges.length; j++) {
      trendHtml += '<button class="time-range-btn trend-range-btn' +
        (tRanges[j].days === dashboardState.snapshotRange ? ' active' : '') +
        '" data-days="' + tRanges[j].days + '">' + tRanges[j].label + '</button>';
    }
    trendHtml += '</div>';
    trendHtml += '<div class="chart-container"><canvas id="chartSnapshots"></canvas></div></div>';
    area.innerHTML = trendHtml;

    // bind trend range
    area.querySelectorAll('.trend-range-btn').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        dashboardState.snapshotRange = parseInt(btn.dataset.days);
        var startTime = getStartTime(dashboardState.snapshotRange);
        var snapData = await dashboardApi.getPriceSnapshots(startTime);
        snapData = filterByTab(snapData, dashboardState.platform);
        renderTrendChart(area, snapData);
      });
    });

    // render chart
    if (datasets.length > 0 && timeLabels.length > 0) {
      var ctx = document.getElementById('chartSnapshots').getContext('2d');
      chartInstances.snapshots = new Chart(ctx, {
        type: 'line',
        data: { labels: timeLabels, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { title: { display: false } },
          scales: { y: { beginAtZero: false, title: { display: true, text: t('admin.price') } } }
        }
      });
    }
  }

  // ==================== 初始化 ====================
  // 应用 i18n 到静态元素
  document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
  document.getElementById('pageTitle').textContent = t('admin.title');
  document.getElementById('sidebarTitle').textContent = t('admin.title');
  // ==================== 会话管理 ====================
  async function renderChatSessions(container) {
    container.innerHTML = '<div class="content-card"><p>' + t('admin.loadingData') + '...</p></div>';
    var sessionsApi = window.electronAPI && window.electronAPI.sessions;
    if (!sessionsApi) {
      container.innerHTML = '<div class="content-card"><div class="empty-state"><p>Sessions API 不可用</p></div></div>';
      return;
    }
    try {
      var sessions = await sessionsApi.list();
      if (!sessions || sessions.length === 0) {
        container.innerHTML = '<div class="content-card"><div class="empty-state"><div class="icon">💬</div><p>' + t('admin.noSessions') + '</p></div></div>';
        return;
      }
      var html = '<div class="content-card">';
      html += '<div style="display:flex;flex-direction:column;gap:8px;">';
      sessions.forEach(function(s) {
        var time = s.updated_at ? new Date(s.updated_at).toLocaleString('zh-CN') : '';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg-secondary,#f9f9f9);border-radius:8px;">';
        html += '<div class="btn-restore-session" data-id="' + s.id + '" style="flex:1;min-width:0;cursor:pointer;">';
        html += '<div style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(s.title || '新对话') + '</div>';
        html += '<div style="font-size:12px;color:var(--text-muted,#999);margin-top:4px;">' + escapeHtml(time) + '</div>';
        html += '</div>';
        html += '<button class="btn-delete-session" data-id="' + s.id + '" style="border:none;background:none;color:var(--text-muted,#999);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:12px;">' + t('admin.deleteSession') + '</button>';
        html += '</div>';
      });
      html += '</div></div>';
      container.innerHTML = html;
      container.querySelectorAll('.btn-delete-session').forEach(function(btn) {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          if (!confirm(t('admin.confirmDeleteSession'))) return;
          try {
            await sessionsApi.delete(btn.dataset.id);
            showToast(t('admin.deleted'));
            renderChatSessions(container);
          } catch (e) { showToast(t('admin.deleteFailed') + ': ' + e.message, 'error'); }
        });
      });
      container.querySelectorAll('.btn-restore-session').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          try {
            await sessionsApi.switchFromAdmin(btn.dataset.id);
            showToast('已切换到该会话');
          } catch (e) { showToast('切换失败: ' + e.message, 'error'); }
        });
      });
    } catch (e) {
      container.innerHTML = '<div class="content-card"><div class="empty-state"><p>' + t('admin.loadFailed') + '</p></div></div>';
    }
  }

  document.getElementById('mainHeader').textContent = t('admin.hotelConfig');

  renderMenu();
  renderContent();
  loadData();

  // 用户切换后页面重新获得焦点时，刷新数据（防止显示旧用户的配置）
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      loadData().then(function() { renderContent(); });
    }
  });

  // 监听用户切换事件（主进程广播），立即刷新数据
  if (window.electronAPI && window.electronAPI.auth && window.electronAPI.auth.onStateChange) {
    window.electronAPI.auth.onStateChange(function(user) {
      // 无论登入还是登出，都重新加载数据
      hotelConfig = null;
      ownHotel = null;
      competitors = [];
      renderContent();
      if (user) {
        loadData().then(function() { renderContent(); });
      }
    });
  }
</script>
</body>
</html>
